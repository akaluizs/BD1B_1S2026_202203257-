version: "3.8"

services:
    database:
        image: gvenzl/oracle-xe:latest
        container_name: oracle-db-sbd1
        ports:
            - "1521:1521"
        environment:
            - ORACLE_PASSWORD=system123
            - APP_USER=C123
            - APP_USER_PASSWORD=12345
            - ORACLE_ALLOW_REMOTE=true
        volumes:
            - ./database/init.sql:/container-entrypoint-initdb.d/init.sql
            - oracle_data:/opt/oracle/oradata
        networks:
            - sbd1-network
        healthcheck:
            test: ["CMD", "sqlplus", "-s", "sys/system123@localhost:1521/xe", "as", "sysdba", "select 1 from dual"]
            interval: 10s
            timeout: 5s
            retries: 30

    backend:
        build: ./server
        container_name: express-api-sbd1
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=development
            - DB_USER=C123
            - DB_PASSWORD=12345
            - DB_CONNECTION_STRING=database:1521/xe
        depends_on:
            - database
        networks:
            - sbd1-network

    frontend:
        build:
            context: ./client/client
            dockerfile: Dockerfile
        container_name: next-app-sbd1
        ports:
            - "3001:3000"
        environment:
            - NODE_ENV=development
            - NEXT_PUBLIC_API_URL=http://backend:3000
        depends_on:
            - backend
        networks:
            - sbd1-network

networks:
    sbd1-network:
        driver: bridge

volumes:
    oracle_data:
